name: Auto Create and Build Tauri APK (Super Fast & Tiny)
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # Fitur Cache
      - name: Cache Rust Dependencies
        uses: swatinem/rust-cache@v2

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Inisialisasi otomatis + PEMANGKASAN FITUR RUST
      - name: Initialize Tauri Project Silently
        run: |
          npm init -y
          sed -i 's/"test": "echo \\"Error: no test specified\\" \&\& exit 1"/"tauri": "tauri"/g' package.json
          npm install @tauri-apps/cli@latest @tauri-apps/api@latest
          
          # 1. Jalankan inisialisasi dasar
          npx tauri init --app-name "Aplikasi Arsip" --window-title "Arsip Internal" --frontend-dist "../src" --dev-url "http://localhost:1420" --before-dev-command "" --before-build-command ""
          
          # 2. TRIK PANGKAS FITUR: Mengubah konfigurasi tauri.conf.json agar menonaktifkan fitur yang tidak dipakai
          # Kita gunakan node script sederhana untuk memanipulasi file JSON dengan aman
          node -e '
            const fs = require("fs");
            const config = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
            
            // Set bundle identifier yang unik
            config.identifier = "com.internal.arsipku";
            
            // Memangkas ke fitur paling minimal (hanya menyisakan kemampuan dasar WebView & IPC invoke)
            config.app = {
              withGlobalTauri: true,
              security: {
                capabilities: ["core:default"]
              }
            };
            
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(config, null, 2));
          '

          # 3. Optimasi Ukuran APK Semut di sisi Cargo
          echo -e "\n[profile.release]\nlto = true\ncodegen-units = 1\nstrip = true\npanic = 'abort'" >> src-tauri/Cargo.toml

      # Menginisialisasi komponen Android native
      - name: Initialize Android Platform
        run: npx tauri android init

      # Proses kompilasi menjadi APK
      - name: Build APK
        run: npx tauri android build

      # LANGKAH DETEKTIF: Intip lokasi file APK
      - name: Locate APK File
        run: |
          echo "=== Menampilkan lokasi file APK yang terbuat ==="
          find . -name "*.apk"
          echo "==============================================="

      # Mengunggah file APK dengan jalur pencarian global
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-apk
          path: src-tauri/**/*.apk
          if-no-files-found: error