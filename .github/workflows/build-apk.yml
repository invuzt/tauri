name: Auto Create and Build Tauri APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,i686-linux-android,x86_64-linux-android

      # Langkah Inisialisasi + Trik Mengubah Bundle Identifier secara otomatis
      - name: Initialize Tauri Project Silently
        run: |
          npm init -y
          npm install @tauri-apps/cli@latest @tauri-apps/api@latest
          npx tauri init --app-name "Aplikasi Arsip" --window-title "Arsip Internal" --frontend-dist "../src" --dev-url "http://localhost:1420" --before-dev-command "" --before-build-command ""
          
          # TRIK SAKTI: Mengubah "com.tauri.dev" menjadi "com.internal.arsipku" di file konfigurasi tauri
          sed -i 's/"com.tauri.dev"/"com.internal.arsipku"/g' src-tauri/tauri.conf.json

      # Menginisialisasi komponen Android native di server GitHub
      - name: Initialize Android Platform
        run: npx tauri android init

      # Proses kompilasi kode HTML/CSS/JS menjadi file APK
      - name: Build APK
        run: npx tauri android build

      # Mengumpulkan file APK hasil build agar bisa kamu download langsung di HP
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/**/*.apk