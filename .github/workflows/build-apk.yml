name: Auto Create and Build Tauri APK (Super Fast & Tiny)
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android # DIOPTIMALKAN: Hanya compile untuk HP modern (bikin build 4x lebih cepat & APK lebih kecil)

      # TRIK CEPAT 1: Cache framework Rust agar build kedua dan seterusnya tinggal melanjutkan
      - name: Cache Rust Dependencies
        uses: swatinem/rust-cache@v2

      # TRIK CEPAT 2: Cache folder NPM agar tidak download ulang dependensi JS
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Langkah Inisialisasi + Trik Ukuran Semut
      - name: Initialize Tauri Project Silently
        run: |
          npm init -y
          sed -i 's/"test": "echo \\"Error: no test specified\\" \&\& exit 1"/"tauri": "tauri"/g' package.json
          npm install @tauri-apps/cli@latest @tauri-apps/api@latest
          npx tauri init --app-name "Aplikasi Arsip" --window-title "Arsip Internal" --frontend-dist "../src" --dev-url "http://localhost:1420" --before-dev-command "" --before-build-command ""
          
          # Mengubah bundle identifier agar unik
          sed -i 's/"com.tauri.dev"/"com.internal.arsipku"/g' src-tauri/tauri.conf.json
          
          # TRIK UKURAN SEMUT: Memaksa compiler Rust melakukan optimasi kompresi tingkat tinggi (Strip & LTO)
          echo -e "\n[profile.release]\nlto = true\ncodegen-units = 1\nstrip = true\npanic = 'abort'" >> src-tauri/Cargo.toml

      # Menginisialisasi komponen Android native
      - name: Initialize Android Platform
        run: npx tauri android init

      # Proses kompilasi menjadi APK
      - name: Build APK
        run: npx tauri android build

      # Mengumpulkan file APK hasil build
      - name: Upload APK Artifact
        uses: actions/artifact@v4
        with:
          name: tauri-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/**/*.apk