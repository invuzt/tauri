name: Auto Create and Build Tauri APK (Super Fast & Tiny)
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # Fitur Cache
      - name: Cache Rust Dependencies
        uses: swatinem/rust-cache@v2

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Inisialisasi otomatis
      - name: Initialize Tauri Project Silently
        run: |
          npm init -y
          sed -i 's/"test": "echo \\"Error: no test specified\\" \&\& exit 1"/"tauri": "tauri"/g' package.json
          npm install @tauri-apps/cli@latest @tauri-apps/api@latest
          npx tauri init --app-name "Aplikasi Arsip" --window-title "Arsip Internal" --frontend-dist "../src" --dev-url "http://localhost:1420" --before-dev-command "" --before-build-command ""
          
          # Mengubah bundle identifier agar unik
          sed -i 's/"com.tauri.dev"/"com.internal.arsipku"/g' src-tauri/tauri.conf.json
          
          # Optimasi Ukuran APK Semut
          echo -e "\n[profile.release]\nlto = true\ncodegen-units = 1\nstrip = true\npanic = 'abort'" >> src-tauri/Cargo.toml

      # Menginisialisasi komponen Android native
      - name: Initialize Android Platform
        run: npx tauri android init

      # Proses kompilasi menjadi APK
      - name: Build APK
        run: npx tauri android build

      # LANGKAH DETEKTIF: Intip semua file .apk yang berhasil terbuat di dalam server
      - name: Locate APK File
        run: |
          echo "=== Menampilkan lokasi file APK yang terbuat ==="
          find . -name "*.apk"
          echo "==============================================="

      # Mengunggah file APK dengan jalur pencarian global (Mulai dari folder root src-tauri)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-apk
          path: src-tauri/**/*.apk # Diperluas pencariannya agar pasti ketemu di folder mana pun
          if-no-files-found: error # Jika kali ini tetap tidak ketemu, paksa sistem untuk memunculkan pesan eror yang jelas